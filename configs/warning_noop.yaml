# Warning-as-uncertainty wrapper (noop fallback)

model:
  family: openvla

env:
  task_suite_name: libero_10
  num_trials_per_task: 20
  seed: 7
  selected_task_ids: [0, 1, 2, 3, 4]

intervention:
  enabled: false
  dict_name: blank
  coef: 0.0

monitor:
  enabled: true
  layer: 10
  site: mlp.down_proj.pre
  agg: mean
  direction_path: null
  control_mode: none
  tau: 0.0
  alpha: 0.0
  nearmiss:
    enabled: true
    visual:
      enabled: true
      kinds: [occlusion]
      strength: 0.35
  warning_policy: noop
  warning_tau: 0.0
  warning_patience: 2
  warning_duration: 3
  warning_cooldown: 5

logging:
  root_dir: logs
  save_video: false
  save_actions: false
