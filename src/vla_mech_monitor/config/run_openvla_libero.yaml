seed: 42
out_dir: results/openvla_libero_run1

policy:
  model_id: openvla/openvla-7b
  device: cuda
  precision: bf16
  unnorm_key: bridge_orig
  do_sample: false
  hook_last_n_mlp: 4
  hook_regex: "layers\\.(\\d+)\\.mlp\\.down_proj$"
  capture_token: last

env:
  backend: auto # auto | lerobot | libero
  task_suite: libero_10 # keep small first
  num_envs: 1 # start 1, later increase
  max_steps: 250
  image_key: image # env wrapper outputs obs[image_key]

nearmiss:
  episodes_per_task: 40
  perturbations:
    - name: clean
      params: {}
    - name: instr_left_right_flip
      params: {}
    - name: vision_occlusion
      params:
        patch_size: 32
        severity: 0.20
    - name: action_noise
      params:
        sigma: 0.01
  failure_within_k: 15

logging:
  activation_stride: 1
  save_activations: true
  save_rollouts: true

monitor:
  type: directions # directions | probe
  modes: ["wrong_object", "wrong_location", "drop", "goal_drift", "other"]
  probe:
    kind: logistic # logistic | mlp
    lr: 0.001
    epochs: 10
    hidden: 256

steering:
  enabled: true
  alpha: 0.8
  tau: 1.5
  consec: 2
  intervene_steps: 6
  cooldown_steps: 10

sweep:
  taus: [1.0, 1.25, 1.5, 1.75, 2.0]
  alphas: [0.2, 0.5, 0.8, 1.0]
